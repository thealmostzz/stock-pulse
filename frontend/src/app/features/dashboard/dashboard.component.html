<main class="dashboard" aria-label="Stock Pulse operating dashboard">
  <aside class="dashboard__sidebar" aria-label="Watchlist">
    <sp-watchlist-panel />
  </aside>

  <section class="dashboard__feed" aria-label="Realtime news feed">
    <sp-news-feed [items]="items()" [isLoading]="isLoading()" />
  </section>

  <aside class="dashboard__detail" aria-label="News inspector">
    <p class="dashboard__eyebrow">CONTEXT INSPECTOR</p>
    <h2>เลือกข่าวเพื่อดูรายละเอียด</h2>
    <p>เปิดบทความจากรายการข่าวเพื่อดูแหล่งข้อมูลและผลกระทบต่อหุ้นที่เกี่ยวข้อง</p>
  </aside>
</main>
